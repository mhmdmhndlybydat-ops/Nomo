<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOMO Software</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Navbar */
.navbar {
    background: #0d1b2a;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
}

/* Hero */
.hero {
    background: linear-gradient(to right, #1b263b, #415a77);
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 40px;
}

.hero button {
    padding: 12px 20px;
    background: #00b4d8;
    border: none;
    color: white;
    cursor: pointer;
}

/* Services */
.services {
    padding: 50px;
    text-align: center;
}

.service-box {
    display: inline-block;
    width: 250px;
    margin: 15px;
    padding: 20px;
    background: #f1f1f1;
    border-radius: 10px;
}

/* Footer */
.footer {
    background: #0d1b2a;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>

</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2>NOMO</h2>
    <div>
        <a href="#">الرئيسية</a>
        <a href="#">الخدمات</a>
        <a href="#">تواصل</a>
    </div>
</div>

<!-- Hero -->
<div class="hero">
    <h1>شركة NOMO للبرمجيات</h1>
    <p>نحوّل أفكارك إلى منتجات رقمية قوية</p>
    <button onclick="alert('مرحبا بك في NOMO')">ابدأ الآن</button>
</div>

<!-- Services -->
<div class="services">
    <h2>خدماتنا</h2>

    <div class="service-box">
        <h3>تطوير مواقع</h3>
        <p>نصمم مواقع احترافية سريعة</p>
    </div>

    <div class="service-box">
        <h3>تطبيقات موبايل</h3>
        <p>Android و iOS</p>
    </div>

    <div class="service-box">
        <h3>ذكاء اصطناعي</h3>
        <p>حلول ذكية لعملك</p>
    </div>

</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 NOMO Software</p> 
</div>

</body>
</html>
